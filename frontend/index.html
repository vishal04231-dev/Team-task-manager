<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlowTask | Team Task Manager</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
  <div id="app">
    <!-- Auth Screen -->
    <div id="auth-screen" class="auth-container">
      <div class="auth-card">
        <h1><i class="fas fa-tasks"></i> FlowTask</h1>
        <div class="auth-tabs">
          <button class="tab-btn active" data-tab="login">Login</button>
          <button class="tab-btn" data-tab="signup">Sign Up</button>
        </div>
        <form id="login-form">
          <input type="email" id="login-email" placeholder="Email" required>
          <input type="password" id="login-password" placeholder="Password" required>
          <button type="submit">Login</button>
        </form>
        <form id="signup-form" style="display:none">
          <input type="text" id="signup-name" placeholder="Full Name" required>
          <input type="email" id="signup-email" placeholder="Email" required>
          <input type="password" id="signup-password" placeholder="Password" required>
          <button type="submit">Sign Up</button>
        </form>
        <div id="auth-error" class="error-msg"></div>
      </div>
    </div>

    <!-- Main App -->
    <div id="main-app" style="display:none">
      <div class="sidebar">
        <div class="logo-area"><i class="fas fa-tasks"></i><h2>FlowTask</h2></div>
        <nav>
          <a href="#" data-page="dashboard" class="active"><i class="fas fa-chart-line"></i> Dashboard</a>
          <a href="#" data-page="projects"><i class="fas fa-folder"></i> Projects</a>
          <a href="#" data-page="tasks"><i class="fas fa-check-circle"></i> Tasks</a>
        </nav>
        <div class="theme-toggle">
          <i class="fas fa-moon"></i>
          <label class="switch"><input type="checkbox" id="darkModeToggle"><span class="slider round"></span></label>
          <i class="fas fa-sun"></i>
        </div>
        <button id="logoutBtn" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</button>
      </div>
      <div class="main-content">
        <div id="page-content"></div>
      </div>
    </div>
  </div>

  <!-- Custom Modal Overlay (for attractive popups) -->
  <div id="modalOverlay" class="modal-overlay" style="display:none">
    <div class="modal-container">
      <div class="modal-header">
        <h3 id="modalTitle">Modal Title</h3>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <div class="modal-body" id="modalBody">
        <!-- dynamic content will be injected here -->
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
